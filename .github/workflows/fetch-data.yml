name: Fetch Sheet Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from Google Sheets
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          python3 - <<'EOF'
          import csv, json, io, urllib.request, os, sys
          from datetime import datetime

          sheet_id = os.environ['SHEET_ID']
          url = (
            'https://docs.google.com/spreadsheets/d/' + sheet_id +
            '/gviz/tq?tqx=out:csv&sheet=Main+Database'
          )
          print('Fetching:', url)
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          try:
            with urllib.request.urlopen(req, timeout=30) as r:
              raw = r.read().decode('utf-8')
          except Exception as e:
            print('ERROR:', e)
            sys.exit(1)
          rows = list(csv.reader(io.StringIO(raw)))
          if len(rows) < 2:
            print('ERROR: no data rows')
            sys.exit(1)
          data_rows = [r for r in rows[1:] if r and r[0].strip()]
          out = {
            'headers': rows[0],
            'rows': data_rows,
            'fetched_at': datetime.utcnow().isoformat() + 'Z',
            'row_count': len(data_rows)
          }
          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(out, f, ensure_ascii=False)
          print('Done:', len(data_rows), 'rows written')
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
